name: grading

# Reusable two-tier grading pipeline for heig-classroom student repositories.
#
# Student repos keep a thin `.github/workflows/grading.yml` shim:
#
#   on:
#     push:
#       branches: [main, master]
#     workflow_dispatch:          # teacher's "grade now" button
#     repository_dispatch:
#       types: [grade-final, grade-milestone]
#   permissions:
#     contents: write   # the llm-review job commits the review file
#     checks: write
#   jobs:
#     grading:
#       uses: heig-tin-info/score/.github/workflows/grading.yml@0.7.5
#       secrets:
#         # `secrets: inherit` would NOT forward org secrets across the org
#         # boundary (this reusable lives in heig-tin-info): map explicitly.
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
#       with:
#         build-command: make
#         test-command: pip install pytest && pytest --junitxml=report.xml
#
# Tiers (the caller's event decides which job runs):
#   - push               -> `objective`: deterministic mark (build + tests),
#                           published as the single GRADE annotation. Indicative.
#   - repository_dispatch -> `llm-review`: LLM correction of the commit sent by
#                           heig-classroom. `grade-final` reviews the frozen
#                           commit against the full criteria and writes the
#                           awarded points + rationale INTO criteria.yml
#                           (commit "grading: <mark>/<scale>", authoritative);
#                           `grade-milestone` reviews only the criteria tagged
#                           `milestone: <name>` and writes GRADING-<name>.yml
#                           (intermediate, trace-only platform-side).

on:
  workflow_call:
    inputs:
      criteria-file:
        description: "Path to the criteria file."
        type: string
        default: "criteria.yml"
      build-command:
        description: "Command that builds the submission."
        type: string
        default: "make"
      test-command:
        description: "Command that runs the tests and writes JUnit XML to report.xml."
        type: string
        default: "pip install pytest && pytest --junitxml=report.xml"
      review-test-command:
        description: "Verbose test command whose output feeds the LLM reviewer."
        type: string
        default: "pip install pytest && pytest -vv"
      tests-criterion:
        description: "Dotted id of the all-tests-passed criterion."
        type: string
        default: "binary.all-tests-passed"
      build-errors-criterion:
        description: "Dotted id of the no-build-errors criterion (blank to skip)."
        type: string
        default: ""
      scale:
        description: "Denominator for the GRADE annotation (max of the scale)."
        type: string
        default: "6"
      python-version:
        description: "Python version to set up."
        type: string
        default: "3.12"
      apt-packages:
        description: "apt packages installed before building (blank to skip)."
        type: string
        default: "build-essential"
      score-spec:
        description: "pip requirement used to install StudentScore in the LLM tier."
        type: string
        default: "StudentScore[llm]"
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic key for the LLM tier (map it explicitly: org secrets do not cross the org boundary with `secrets: inherit`)."
        required: false

jobs:
  # ---------------------------------------------------------------------------
  # Tier 1 — objective mark on every push (no LLM, deterministic, free).
  # ---------------------------------------------------------------------------
  objective:
    # push or manual trigger; on a repository_dispatch the llm-review job owns
    # the single GRADE annotation (two annotations in one run void the grade).
    # Platform bot pushes (sync, revert, deadline) never get graded, but a
    # workflow_dispatch fired BY the platform bot must run: it is the teacher's
    # "grade now" and executes on the student's own head commit.
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push'
          && github.actor != 'hgc-prod[bot]'
          && github.actor != 'hgc-dev[bot]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install build tooling
        if: inputs.apt-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-packages }}

      - name: Grade (objective)
        uses: heig-tin-info/score/.github/actions/score-grade@0.7.5
        with:
          criteria-file: ${{ inputs.criteria-file }}
          build-command: ${{ inputs.build-command }}
          test-command: ${{ inputs.test-command }}
          tests-criterion: ${{ inputs.tests-criterion }}
          build-errors-criterion: ${{ inputs.build-errors-criterion }}
          python-version: ${{ inputs.python-version }}
          scale: ${{ inputs.scale }}

  # ---------------------------------------------------------------------------
  # Tier 2 — full LLM correction at the deadline / a milestone. Triggered by
  # heig-classroom via repository_dispatch; commits the graded review file.
  # ---------------------------------------------------------------------------
  llm-review:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # give the LLM access to the git history if needed
          # heig-classroom passes the frozen commit to grade; fall back to HEAD.
          ref: ${{ github.event.client_payload.sha || github.ref }}

      - name: Install build tooling
        if: inputs.apt-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-packages }}

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install StudentScore (with LLM extra)
        run: python -m pip install --upgrade pip "${{ inputs.score-spec }}"

      - name: Build and run tests (feed the results to the grader)
        continue-on-error: true
        run: |
          (${{ inputs.build-command }}) 2>&1 | tee build-output.txt || true
          (${{ inputs.review-test-command }}) 2>&1 | tee test-output.txt || true

      # grade-final applies the review IN PLACE: criteria.yml gains each
      # criterion's awarded_points and the LLM rationale, and the commit
      # carries the mark. grade-milestone covers only the criteria tagged
      # `milestone: <name>` — the filter prunes everything else — so it lands
      # in its own GRADING-<name>.yml and never touches the barème. The
      # platform validates the name against [a-z0-9][a-z0-9_-]* (shell-safe).
      - name: Resolve review target
        id: review
        env:
          MILESTONE: ${{ github.event.client_payload.milestone || '' }}
        run: |
          if [ -n "$MILESTONE" ]; then
            echo "file=GRADING-${MILESTONE}.yml" >> "$GITHUB_OUTPUT"
            echo "args=--milestone ${MILESTONE} -o GRADING-${MILESTONE}.yml" >> "$GITHUB_OUTPUT"
          else
            echo "file=${{ inputs.criteria-file }}" >> "$GITHUB_OUTPUT"
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Grade with Claude
        id: grade
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          score grade "${{ inputs.criteria-file }}" --llm ${{ steps.review.outputs.args }} \
            --source build-output.txt \
            --source test-output.txt
          # The reviewed file carries awarded_points + rationale per criterion.
          score -v "${{ steps.review.outputs.file }}"

      - name: Publish grade
        id: publish
        if: always()
        run: |
          # An infrastructure failure must NOT become a student grade. The
          # in-place target always exists, so gate on the grading step itself.
          if [ "${{ steps.grade.outcome }}" != "success" ]; then
            echo "::error title=GRADING::LLM review failed — no grade emitted"
            exit 1
          fi
          MARK=$(score json "${{ steps.review.outputs.file }}" | python -c "import sys,json;print(f\"{json.load(sys.stdin)['mark']:g}\")")
          echo "mark=${MARK}" >> "$GITHUB_OUTPUT"
          echo "::notice title=GRADE::${MARK}/${{ inputs.scale }}"

      - name: Commit the review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pushed with the default GITHUB_TOKEN on purpose: GitHub never
          # re-triggers workflows for GITHUB_TOKEN pushes or API commits, so
          # no grading loop. Never replace this with a PAT.
          git config user.name "hgc-grader[bot]"
          git config user.email "grader@heig-vd.ch"
          BASE=$(git rev-parse HEAD)
          git add "${{ steps.review.outputs.file }}"
          if git diff --cached --quiet; then
            echo "No grading changes to commit."
            exit 0
          fi
          MSG="grading: ${{ steps.publish.outputs.mark }}/${{ inputs.scale }} (${{ github.event.action }})"
          git commit -m "$MSG"
          # HEAD sat on the dispatched sha: if the student pushed since (or
          # the deadline bot moved the branch) this push is rejected...
          if git push origin "HEAD:${{ github.event.repository.default_branch }}"; then
            exit 0
          fi
          # ...then park the review on a `grading` branch — via the API, NOT
          # a git push: pushing a commit whose tree carries the frozen sha's
          # workflows is rejected whenever they differ from the default
          # branch's ("refusing to allow a GitHub App to update workflow
          # without workflows permission"). The contents API writes only the
          # review file, so workflows never enter the diff: point `grading`
          # at the dispatched sha (already known server-side), then PUT the
          # reviewed file onto that branch.
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/heads/grading" -f sha="$BASE" \
            || gh api -X PATCH "repos/${{ github.repository }}/git/refs/heads/grading" \
                 -f sha="$BASE" -F force=true
          PREV=$(gh api "repos/${{ github.repository }}/contents/${{ steps.review.outputs.file }}?ref=grading" --jq .sha || true)
          gh api -X PUT "repos/${{ github.repository }}/contents/${{ steps.review.outputs.file }}" \
            -f branch="grading" -f message="$MSG" \
            -f content="$(base64 -w0 "${{ steps.review.outputs.file }}")" \
            ${PREV:+-f sha="$PREV"}
